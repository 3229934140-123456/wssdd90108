<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务篮 - 转载核查工具</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <div class="container">
    <div class="window-title">
      <span class="dot"></span>
      任务篮
    </div>

    <div class="section">
      <div class="input-group">
        <label>客户名称</label>
        <input type="text" id="clientName" placeholder="请输入客户名称">
      </div>
      <div class="input-group">
        <label>事件关键词</label>
        <input type="text" id="keywords" placeholder="多个关键词用空格分隔">
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        <span>批量整理导入</span>
        <button class="btn btn-secondary btn-small" id="toggleBatchBtn">展开</button>
      </div>
      <div id="batchArea" style="display: none;">
        <textarea class="batch-textarea" id="batchInput" rows="6" placeholder="支持多种粘贴格式，自动识别字段：&#10;&#10;【格式1】带标签前缀（推荐）&#10;标题：某科技公司大规模裁员&#10;来源：科技日报&#10;时间：2026-06-19 14:30&#10;作者：张三&#10;正文：今日，某知名科技公司宣布...&#10;&#10;【格式2】空行分多篇，自动识别标题/来源/时间/正文&#10;科技日报&#10;某科技公司宣布大规模裁员&#10;2026-06-19 14:30:00&#10;今日，某知名科技公司宣布...&#10;&#10;【格式3】| 分隔结构化&#10;URL|标题|来源|时间|正文段1||正文段2"></textarea>
        <div style="margin-top: 8px; display: flex; gap: 8px;">
          <button class="btn btn-primary btn-small" id="parseBatchBtn">解析导入</button>
          <button class="btn btn-secondary btn-small" id="pasteBatchBtn">粘贴剪贴板</button>
          <button class="btn btn-secondary btn-small" id="clearBatchBtn">清空输入框</button>
        </div>
      </div>
      <div class="section-title" style="margin-top: 10px;">
        <span>或拖拽/粘贴链接</span>
        <button class="btn btn-secondary btn-small" id="pasteBtn">粘贴</button>
      </div>
      <div class="drop-zone" id="dropZone">
        <p>拖拽链接到此处</p>
        <p class="hint">或点击下方按钮添加示例数据</p>
      </div>
      <div style="margin-top: 8px; display: flex; gap: 8px;">
        <button class="btn btn-secondary btn-small" id="addSampleBtn">加载示例数据</button>
        <button class="btn btn-secondary btn-small" id="clearBtn">清空</button>
      </div>
    </div>

    <div class="section" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
      <div class="section-title">
        <span>稿件列表</span>
        <span id="articleCount" style="font-size: 11px; color: #7c7c9a;">0 篇</span>
      </div>
      <div class="tabs" id="viewTabs">
        <div class="tab active" data-view="edit">编辑补填</div>
        <div class="tab" data-view="chains">链路视图</div>
        <div class="tab" data-view="list">列表视图</div>
      </div>
      <div id="missingWarning" style="display: none; background: rgba(235, 51, 73, 0.1); border: 1px solid rgba(235, 51, 73, 0.3); border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: #ff8a95;">
        <span id="missingText"></span>
      </div>
      <div class="article-list" id="chainList">
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>添加链接后可补填稿件信息</p>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-secondary" id="compareBtn" disabled>对照选中稿件</button>
      <button class="btn btn-primary" id="generateBtn" disabled>生成核查结论</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
