<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核查结论 - 转载核查工具</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <div class="container">
    <div class="window-title">
      <span class="dot" style="background: #4ecca3;"></span>
      核查结论
    </div>

    <div class="conclusion-section">
      <div class="conclusion-label">
        <span class="icon">1</span>
        传播源头
      </div>
      <div class="selectable-list" id="sourceList">
        <span style="color: #5c5c7a; font-size: 12px;">暂无数据</span>
      </div>
    </div>

    <div class="conclusion-section">
      <div class="conclusion-label">
        <span class="icon">2</span>
        关键扩散媒体（多选）
      </div>
      <div class="selectable-list" id="keyMediaList">
        <span style="color: #5c5c7a; font-size: 12px;">暂无数据</span>
      </div>
    </div>

    <div class="conclusion-section">
      <div class="conclusion-label">
        <span class="icon">3</span>
        不确定节点（多选）
      </div>
      <div class="selectable-list" id="uncertainList">
        <span style="color: #5c5c7a; font-size: 12px;">暂无数据</span>
      </div>
    </div>

    <div class="conclusion-section">
      <div class="conclusion-label">
        <span class="icon">4</span>
        人工判断（一句话）
      </div>
      <textarea class="conclusion-textarea" id="judgmentInput" placeholder="例如：该事件由每日经济首发，经科技资讯直接转载后扩散，新闻晨报属二次报道..."></textarea>
    </div>

    <div class="conclusion-section" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
      <div class="conclusion-label">
        <span class="icon">📋</span>
        结论预览
        <button class="btn btn-secondary btn-small" id="copyBtn" style="margin-left: auto;">复制</button>
      </div>
      <div class="report-box" id="reportBox">
        请先填写核查信息...
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-secondary" id="resetBtn">重置</button>
      <button class="btn btn-success" id="confirmBtn">确认生成</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
