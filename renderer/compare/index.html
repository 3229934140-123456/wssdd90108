<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相似稿对照 - 转载核查工具</title>
  <link rel="stylesheet" href="../../shared/style.css">
</head>
<body>
  <div class="container">
    <div class="window-title">
      <span class="dot" style="background: #667eea;"></span>
      相似稿对照
    </div>

    <div class="section">
      <div class="section-title">
        <span>稿件选择</span>
        <div style="display: flex; gap: 6px;">
          <button class="btn btn-secondary btn-small" id="prevBtn">← 上一组</button>
          <button class="btn btn-secondary btn-small" id="nextBtn">下一组 →</button>
        </div>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <select id="leftSelect" style="flex: 1; padding: 8px; background: #16162a; border: 1px solid #2d2d4a; border-radius: 6px; color: #e0e0e0; font-size: 12px;">
          <option>选择左侧稿件</option>
        </select>
        <span style="color: #7c7c9a; font-size: 18px;">⇄</span>
        <select id="rightSelect" style="flex: 1; padding: 8px; background: #16162a; border: 1px solid #2d2d4a; border-radius: 6px; color: #e0e0e0; font-size: 12px;">
          <option>选择右侧稿件</option>
        </select>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="num" id="simNum">-</div>
        <div class="label">总体相似度</div>
      </div>
      <div class="stat-card">
        <div class="num" id="sameNum" style="color: #4ecca3;">-</div>
        <div class="label">相同段落</div>
      </div>
      <div class="stat-card">
        <div class="num" id="diffNum" style="color: #ffc107;">-</div>
        <div class="label">差异段落</div>
      </div>
      <div class="stat-card">
        <div class="num" id="addNum" style="color: #ce93d8;">-</div>
        <div class="label">新增/删除</div>
      </div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
      <div class="diff-panel">
        <div class="diff-side">
          <div class="diff-side-header">
            <span id="leftTitle">左侧稿件</span>
            <span class="time" id="leftTime">-</span>
          </div>
          <div class="diff-content" id="leftContent">
            <div class="empty-state">
              <div class="icon">📄</div>
              <p>选择稿件后显示对比</p>
            </div>
          </div>
        </div>
        <div class="diff-side">
          <div class="diff-side-header">
            <span id="rightTitle">右侧稿件</span>
            <span class="time" id="rightTime">-</span>
          </div>
          <div class="diff-content" id="rightContent">
            <div class="empty-state">
              <div class="icon">📄</div>
              <p>选择稿件后显示对比</p>
            </div>
          </div>
        </div>
      </div>

      <div class="diff-summary" id="diffSummary">
        <h4>差异分析</h4>
        <div class="diff-summary-item">
          <span class="label">标题变化</span>
          <span class="value" id="titleDiff">-</span>
        </div>
        <div class="diff-summary-item">
          <span class="label">来源变化</span>
          <span class="value" id="sourceDiff">-</span>
        </div>
        <div class="diff-summary-item">
          <span class="label">图片变化</span>
          <span class="value" id="imageDiff">-</span>
        </div>
        <div class="diff-summary-item">
          <span class="label">时间差</span>
          <span class="value" id="timeDiff">-</span>
        </div>
        <div class="diff-summary-item">
          <span class="label">转载类型</span>
          <span class="value" id="reprintType">-</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-secondary" id="markSourceBtn">标记为源头</button>
      <button class="btn btn-primary" id="toConclusionBtn">生成结论</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
